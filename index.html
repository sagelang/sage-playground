<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage Playground — Run Agents in Your Browser</title>
    <meta name="description" content="Write and run Sage agents directly in your browser, powered by WebAssembly.">
    <link rel="icon" href="ward-owl.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="ward-owl.png" alt="Ward" class="logo">
            <h1>Sage Playground</h1>
            <span class="badge">Powered by WebAssembly</span>
        </div>
        <div class="header-right">
            <a href="https://github.com/sagelang/sage" class="gh-link" target="_blank" rel="noopener">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </a>
        </div>
    </header>

    <main>
        <div class="editor-panel">
            <div class="panel-header">
                <div class="tab-bar">
                    <select id="example-select">
                        <option value="hello">Hello World</option>
                        <option value="counter">Counter Loop</option>
                        <option value="strings">String Operations</option>
                        <option value="fibonacci">Fibonacci</option>
                    </select>
                </div>
                <div class="panel-actions">
                    <button id="btn-run" class="btn-primary" onclick="runExample()">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6z"/></svg>
                        Run
                    </button>
                </div>
            </div>
            <div class="editor-wrap">
                <pre id="highlight" aria-hidden="true"><code></code></pre>
                <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
            </div>
        </div>

        <div class="output-panel">
            <div class="panel-header">
                <span class="panel-title">Console</span>
                <div class="panel-actions">
                    <button class="btn-ghost" onclick="clearConsole()">Clear</button>
                </div>
            </div>
            <div id="console"></div>
        </div>
    </main>

    <footer>
        <span>Sage v2.1.0</span>
        <span class="sep">·</span>
        <span>A language for building intelligent agents</span>
        <span class="sep">·</span>
        <a href="https://github.com/sagelang/sage-playground" target="_blank" rel="noopener">Source</a>
    </footer>

    <script src="app.js" type="module"></script>
</body>
</html>
